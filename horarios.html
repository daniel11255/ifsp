<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professores — Portal 1INFO-2</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .container{max-width:1000px;margin:0 auto;padding:28px 20px 60px;}
    .page-header{margin-bottom:24px;display:flex;flex-direction:column;gap:16px}
    .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
    .page-title{font-family:var(--display);font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.02em}
    .page-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
    
    /* Container da Barra de Pesquisa */
    .search-wrapper{position:relative;width:100%;display:flex;align-items:center}
    #searchBar{padding:12px 140px 12px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-family:var(--sans);font-size:14px;width:100%;transition:all .2s;box-shadow:var(--sh)}
    #searchBar:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(184,92,42,.1)}
    #searchBar::placeholder{color:var(--muted)}
    
    /* Indicador de Carregamento na Barra de Pesquisa */
    .search-loading-indicator {position:absolute;right:12px;display:flex;align-items:center;gap:8px;opacity:0;pointer-events:none;transition:opacity 0.2s ease;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.05em}
    .search-loading-indicator.active {opacity:1}
    .status-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* Layout do Bloco de Informações (Tabela) */
    .table-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;position:relative;min-height:200px;transition:opacity 0.2s ease, transform 0.2s ease}
    .table-responsive{overflow-x:auto}
    
    /* Classe adicionada via JS para ocultar o bloco inteiro ao digitar */
    .table-card.searching {opacity:0;pointer-events:none;transform:translateY(10px)}
    
    /* Tela de Nenhum Resultado */
    .empty-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface);z-index:10;opacity:0;pointer-events:none;transition:opacity .2s ease;text-align:center;padding:40px}
    .empty-overlay.active{opacity:1;pointer-events:auto}
    
    table{width:100%;border-collapse:collapse}
    th{background:var(--accent);color:#fff;padding:14px 18px;font-family:var(--mono);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.1em;text-align:left;border-bottom:1px solid rgba(0,0,0,0.1)}
    td{padding:14px 18px;border-bottom:1px solid var(--border);color:var(--text);font-size:13px}

    .btn-manage{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-size:13px;font-weight:600;transition:all .2s;box-shadow:var(--sh);text-decoration:none}
    .btn-manage:hover{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);transform:translateY(-1px)}
    .btn-manage svg{width:16px;height:16px}

    /* Estilos do Modal de Gerenciamento */
    .modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(30,23,17,0.4);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.active{display:flex}
    .modal-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:550px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh-hover);animation:sheetIn 0.3s ease}
    .modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .modal-title{font-weight:800;font-size:18px}
    .modal-body{padding:20px;overflow-y:auto;flex:1}
    .modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
    
    .manage-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;background:var(--surface-2);transition:all .2s}
    .manage-item:hover{border-color:var(--accent)}
    .manage-info div:first-child{font-weight:700;font-size:14px}
    .manage-info div:last-child{font-size:12px;color:var(--muted)}
    
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px;letter-spacing:.05em}
    .form-group input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:14px}
    .form-group input:focus{outline:none;border-color:var(--accent)}
    
    .btn-add-new{width:fit-content;padding:8px 16px;margin:0 auto 20px;border:2px dashed var(--border);background:transparent;color:var(--muted);border-radius:10px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;cursor:pointer;font-size:12px}
    .btn-add-new:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}

    tbody tr:hover td{background:var(--surface-2)}
    .email-link{color:var(--accent);text-decoration:none;font-weight:500;word-break:break-all}
    
    .hl{background:rgba(184,92,42,0.15);color:var(--accent);padding:2px 0;border-radius:2px;font-weight:600}
    
    @keyframes reveal{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
    .reveal{animation:reveal 0.3s cubic-bezier(0.22,1,0.36,1) both}
    .email-link:hover{text-decoration:underline}
    .copy-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--muted);padding:5px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;transition:all .2s;line-height:0}
    .copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .toast-copy{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;z-index:1000;box-shadow:var(--sh);pointer-events:none;animation:toast-in .3s ease-out;transition:opacity .3s}
    @keyframes toast-in{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
    
    @media(max-width:640px){
      .topnav{padding:0 16px}.container{padding:16px 12px 40px}#searchBar{max-width:100%;padding-right:120px}
      #searchBar + .search-loading-indicator span {display:none}
      table,thead,tbody,th,td,tr{display:block}
      thead tr{position:absolute;top:-9999px;left:-9999px}
      tr{border:1px solid var(--border);border-radius:12px;margin-bottom:12px;padding:8px;background:var(--surface)}
      td{border:none;border-bottom:1px solid var(--border);position:relative;padding-left:40% !important;min-height:44px;display:flex;align-items:center}
      td::before{content:attr(data-label);position:absolute;left:14px;width:35%;font-family:var(--mono);font-weight:600;font-size:10px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
    }
  </style>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>
  <script src="shared.js"></script>
  <script src="theme.js" defer></script>
  <script src="eventos.js"></script>

    <div class="nav-brand">

        <div class="nav-title">Portal</div>

      <a href="aulas.html" class="sidebar-link"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Grade</a>

    <a href="index.html" class="nav-brand">
      <div class="nav-logo"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>

    <div style="width:38px"></div>

  <div class="container">
    <div class="page-header">
      <div class="header-top">
        <div>
          <div class="page-title">Atendimento de Professores</div>
          <div class="page-sub">// Horários e contatos disponíveis</div>
        </div>
        <button class="btn-manage" onclick="openManageModal()" title="Adicionar ou Editar Atendimentos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span>Gerenciar</span>
        </button>
      </div>
      <div class="search-wrapper">
        <input type="text" id="searchBar" placeholder="Buscar professor ou matéria...">
        <div id="searchIndicator" class="search-loading-indicator">
          <div class="status-spinner"></div>
          <span>PROCESSANDO...</span>
        </div>
      </div>
    </div>
    
    <!-- Bloco de Informações principal -->
    <div id="tableCard" class="table-card">
      <div id="emptyOverlay" class="empty-overlay">
        <div id="emptyContent"></div>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Professor</th>
              <th>Matéria</th>
              <th>Horário</th>
              <th>Sala</th>
              <th>E-mail</th>
            </tr>
          </thead>
          <tbody id="lista-professores"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal de Gerenciamento -->
  <div id="manageModal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Gerenciar Professores</div>
        <button class="copy-btn" onclick="closeManageModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Lista ou Formulário injetados aqui -->
      </div>
      <div class="modal-footer" id="modalFooter">
        <button class="btn-manage" onclick="closeManageModal()" style="background:var(--surface-2)">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Modal de Confirmação Customizado -->
  <div id="confirmModal" class="modal-overlay" style="z-index: 1100;">
    <div class="modal-card" style="max-width: 380px; text-align: center; padding: 24px;">
      <h2 id="confirmTitle" style="font-size: 18px; font-weight: 800; margin-bottom: 8px;">Confirmação</h2>
      <p id="confirmMessage" style="font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.4;">Tem certeza que deseja prosseguir?</p>
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <button id="confirmYes" class="btn-manage" style="background: var(--accent); color: white; border: none; justify-content: center; width: 100%;">Sim, confirmar</button>
        <button id="confirmNo" class="btn-manage" style="background: var(--surface-2); justify-content: center; width: 100%;">Cancelar</button>
      </div>
    </div>
  </div>

  <footer></footer>

  <script>
    function copyEmail(email, btn) {
      navigator.clipboard.writeText(email).then(() => {
        const original = btn.innerHTML;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0F9D6A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        
        const toast = document.createElement('div');
        toast.className = 'toast-copy';
        toast.textContent = 'E-mail copiado!';
        document.body.appendChild(toast);
        
        setTimeout(() => {
          btn.innerHTML = original;
          toast.style.opacity = '0';
          setTimeout(() => toast.remove(), 300);
        }, 2000);
      }).catch(err => console.error("Erro ao copiar: ", err));
    }

    // --- Lógica de Gerenciamento ---
    const STORAGE_KEY = 'portalHorarios:v1';
    let currentEditingIndex = null;

    function getStoredData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : window.horariosAtendimento;
    }

    function saveStoredData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      window.horariosAtendimento = data;
      document.dispatchEvent(new CustomEvent('dataUpdated'));
    }

    function openManageModal() {
      const modal = document.getElementById('manageModal');
      modal.classList.add('active');
      renderManageList();
    }

    function closeManageModal() {
      document.getElementById('manageModal').classList.remove('active');
    }

    function confirmAction(title, message) {
      return new Promise((resolve) => {
        const modal = document.getElementById('confirmModal');
        const titleEl = document.getElementById('confirmTitle');
        const msgEl = document.getElementById('confirmMessage');
        const yesBtn = document.getElementById('confirmYes');
        const noBtn = document.getElementById('confirmNo');

        titleEl.textContent = title;
        msgEl.textContent = message;
        modal.classList.add('active');
        
        // Se for exclusão, usa cor de perigo (vermelho), se for salvamento usa a cor de destaque (marrom)
        yesBtn.style.background = title.includes('Excluir') ? 'var(--danger)' : 'var(--accent)';

        yesBtn.onclick = () => { modal.classList.remove('active'); resolve(true); };
        noBtn.onclick = () => { modal.classList.remove('active'); resolve(false); };
        modal.onclick = (e) => { if(e.target === modal) { modal.classList.remove('active'); resolve(false); } };
      });
    }

    function renderManageList() {
      const data = getStoredData();
      const body = document.getElementById('modalBody');
      const footer = document.getElementById('modalFooter');
      
      document.getElementById('modalTitle').textContent = "Gerenciar Professores";
      footer.style.display = 'flex';

      let html = `<button class="btn-add-new" onclick="showTeacherForm()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar Novo Professor
      </button>`;

      html += data.map((p, i) => `
        <div class="manage-item">
          <div class="manage-info">
            <div>${p.professor}</div>
            <div>${p.materia}</div>
          </div>
          <div class="manage-actions">
            <button class="copy-btn" onclick="showTeacherForm(${i})" title="Editar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="copy-btn" onclick="deleteTeacher(${i})" style="color:var(--danger)" title="Excluir"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
          </div>
        </div>
      `).join('');

      body.innerHTML = html;
    }

    function showTeacherForm(index = null) {
      currentEditingIndex = index;
      const data = getStoredData();
      const teacher = index !== null ? data[index] : { professor: '', materia: '', horario: '', sala: '', email: '' };
      const body = document.getElementById('modalBody');
      const footer = document.getElementById('modalFooter');

      document.getElementById('modalTitle').textContent = index !== null ? "Editar Professor" : "Novo Professor";
      footer.style.display = 'none';

      body.innerHTML = `
        <form id="teacherForm" onsubmit="handleFormSubmit(event)">
          <div class="form-group"><label>Nome do Professor</label><input type="text" id="f-prof" value="${teacher.professor}" required></div>
          <div class="form-group"><label>Matéria</label><input type="text" id="f-mat" value="${teacher.materia}" required></div>
          <div class="form-group"><label>Horário</label><input type="text" id="f-hor" value="${teacher.horario}" required></div>
          <div class="form-group"><label>Sala</label><input type="text" id="f-sala" value="${teacher.sala}" required></div>
          <div class="form-group"><label>E-mail</label><input type="email" id="f-email" value="${teacher.email}" required></div>
          <div style="display:flex;gap:10px;margin-top:20px">
            <button type="submit" class="btn-manage" style="background:var(--accent);color:white;border:none;flex:1;justify-content:center">Salvar</button>
            <button type="button" class="btn-manage" onclick="renderManageList()" style="flex:1;justify-content:center">Cancelar</button>
          </div>
        </form>
      `;
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      
      const isEdit = currentEditingIndex !== null;
      const confirmed = await confirmAction(
        isEdit ? "Salvar Alterações" : "Adicionar Professor",
        isEdit ? "Deseja salvar as alterações feitas neste professor?" : "Deseja adicionar este novo professor à lista de atendimento?"
      );
      if (!confirmed) return;

      // Capturar dados antes de limpar a interface
      const newTeacher = {
        professor: document.getElementById('f-prof').value,
        materia: document.getElementById('f-mat').value,
        horario: document.getElementById('f-hor').value,
        sala: document.getElementById('f-sala').value,
        email: document.getElementById('f-email').value
      };

      const body = document.getElementById('modalBody');
      const footer = document.getElementById('modalFooter');
      
      // Animação de "Salvando"
      footer.style.display = 'none';
      body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:20px;animation:reveal 0.4s ease">
          <div class="status-spinner" style="width:40px;height:40px;border-width:3px"></div>
          <div style="font-weight:800;letter-spacing:-0.01em;font-size:16px">Salvando alterações...</div>
        </div>
      `;

      // Simula um delay de processamento para a animação ser percebida
      await new Promise(r => setTimeout(r, 800));

      const data = getStoredData();

      if (currentEditingIndex !== null) {
        data[currentEditingIndex] = newTeacher;
      } else {
        data.push(newTeacher);
      }

      saveStoredData(data);
      closeManageModal();
    }

    async function deleteTeacher(index) {
      const confirmed = await confirmAction("Excluir Professor", "Tem certeza que deseja excluir este professor?");
      if (!confirmed) return;
      
      const body = document.getElementById('modalBody');
      const footer = document.getElementById('modalFooter');
      
      footer.style.display = 'none';
      body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:20px;animation:reveal 0.4s ease">
          <div class="status-spinner" style="width:40px;height:40px;border-width:3px;border-top-color:var(--danger)"></div>
          <div style="font-weight:800;letter-spacing:-0.01em;font-size:16px">Removendo registro...</div>
        </div>
      `;

      await new Promise(r => setTimeout(r, 600));

      const data = getStoredData();
      data.splice(index, 1);
      saveStoredData(data);
      closeManageModal();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const tbody = document.getElementById('lista-professores');
      const searchBar = document.getElementById('searchBar');
      const searchIndicator = document.getElementById('searchIndicator');
      const tableCard = document.getElementById('tableCard');
      const emptyOverlay = document.getElementById('emptyOverlay');
      const emptyContent = document.getElementById('emptyContent');

      window.horariosAtendimento = getStoredData();

      const norm = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

      const highlight = (text, term) => {
        if (!term.trim()) return text;
        const cleanTerm = term.trim().replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        const regex = new RegExp(`(${cleanTerm})`, 'gi');
        return text.replace(regex, '<mark class="hl">$1</mark>');
      };

      const render = (filtro = '') => {
        const term = norm(filtro).trim();
        
        const filtered = window.horariosAtendimento.filter(p => 
          norm(p.professor).includes(term) || norm(p.materia).includes(term)
        );
        
        // Remove a bolinha de carregamento da barra
        searchIndicator.classList.remove('active');
        // Traz o bloco de informações de volta com efeito suave
        tableCard.classList.remove('searching');

        if (filtered.length === 0) {
          tbody.innerHTML = '';
          emptyContent.innerHTML = `<div style="font-size:40px;margin-bottom:12px;opacity:0.5">🔍</div><div style="font-weight:700;font-size:16px;color:var(--text);margin-bottom:6px">Nenhum resultado encontrado</div><div style="font-size:13px;color:var(--muted)">Não encontramos nada para "<span style="color:var(--accent);font-weight:600">${filtro.trim()}</span>"</div>`;
          emptyOverlay.classList.add('active');
          return;
        }

        emptyOverlay.classList.remove('active');

        tbody.innerHTML = filtered.map((p, i) => `
          <tr class="reveal" style="animation-delay:${i * 20}ms">
            <td data-label="Professor"><strong>${highlight(p.professor, filtro)}</strong></td>
            <td data-label="Matéria">${highlight(p.materia, filtro)}</td>
            <td data-label="Horário">${p.horario}</td>
            <td data-label="Sala">${p.sala}</td>
            <td data-label="E-mail">
              <div style="display:flex;align-items:center;gap:8px">
                <a href="mailto:${p.email}" class="email-link">${p.email}</a>
                <button class="copy-btn" onclick="copyEmail('${p.email}',this)" title="Copiar e-mail">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
              </div>
            </td>
          </tr>
        `).join('');
      };

      let searchTimeout;
      render();

      searchBar.addEventListener('input', () => {
        const val = searchBar.value;
        if (val.trim().length > 0) {
          // Ativa o spinner na barra e Oculta o bloco de dados inteiramente
          searchIndicator.classList.add('active');
          tableCard.classList.add('searching');
          
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => render(val), 350); 
        } else {
          clearTimeout(searchTimeout);
          searchIndicator.classList.remove('active');
          tableCard.classList.remove('searching');
          render('');
        }
      });

      document.addEventListener('dataUpdated', () => render(searchBar.value));
      
      // Fechar modal ao clicar fora
      document.getElementById('manageModal').addEventListener('click', (e) => {
        if(e.target.id === 'manageModal') closeManageModal();
      });
    });
  </script>
</body>
</html>
