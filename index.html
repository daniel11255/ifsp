<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <title>Portal | 1INFO-2</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .page-shell { max-width: 900px; margin: 0 auto; padding: 28px 20px 72px; }

    /* CLOCK */
    .clock-block {
      background: var(--accent); color: #fff;
      border-radius: var(--radius); padding: 22px 24px;
      display: flex; flex-direction: column; justify-content: center;
      min-width: 164px; box-shadow: 0 4px 20px rgba(184,92,42,.3);
      position: relative; overflow: hidden; margin-bottom: 16px;
    }
    .clock-block::after {
      content: ''; position: absolute; bottom: -30px; right: -30px;
      width: 110px; height: 110px;
      border: 30px solid rgba(255,255,255,.07); border-radius: 50%;
    }
    html[data-theme="dark"] .clock-block { 
      background: linear-gradient(135deg, #262626 0%, #0A0A0A 100%); 
      border: 1px solid var(--border);
      box-shadow: none;
    }
    .clock-time    { font-family: var(--mono); font-size: 38px; font-weight: 500; letter-spacing: -.03em; line-height: 1; }
    .clock-secs    { font-family: var(--mono); font-size: 20px; font-weight: 400; opacity: .55; vertical-align: super; }
    .clock-weekday { font-size: 11px; font-weight: 700; opacity: .7; margin-top: 8px; text-transform: uppercase; letter-spacing: .1em; }
    .clock-date    { font-family: var(--mono); font-size: 11px; opacity: .55; margin-top: 3px; }

    /* SCHEDULE CARD */
    .schedule-card { background: var(--surface); border: 1px solid var(--border); border-top: 4px solid var(--accent); border-radius: var(--radius); box-shadow: 0 12px 30px -10px rgba(0,0,0,0.1); margin-bottom: 24px; overflow: hidden; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .schedule-card:hover { transform: translateY(-2px); box-shadow: 0 16px 40px -12px rgba(0,0,0,0.15); }
    .schedule-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--surface-2); }
    .schedule-header-left { display: flex; align-items: center; gap: 10px; }
    .schedule-eyebrow { font-family: var(--mono); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .12em; color: var(--accent); }
    .schedule-today-badge { font-family: var(--mono); font-size: 10px; font-weight: 700; background: var(--accent); color: #fff; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
    .schedule-count { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .sched-row { display: grid; grid-template-columns: 148px 1fr auto; align-items: center; gap: 16px; padding: 18px 24px; border-bottom: 1px solid var(--border); position: relative; transition: background .15s; }
    .sched-row:last-child { border-bottom: none; }
    .sched-row.live  { background: linear-gradient(90deg,rgba(40,120,80,.06) 0%,transparent 55%); }
    .sched-row.live::before, .sched-row.next-up::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 0 2px 2px 0; }
    .sched-row.live::before    { background: var(--green); }
    .sched-row.next-up::before { background: var(--accent); opacity: 0.8; }
    .sched-row.done { opacity: .42; }
    .class-progress-bar { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--green); transition: width 1s linear; opacity: 0.6; }
    .sched-time { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--muted); white-space: nowrap; }
    .sched-row.live .sched-time    { color: var(--green);  font-weight: 600; }
    .sched-row.next-up .sched-time { color: var(--accent); font-weight: 600; }
    .sched-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
    .sched-row.done .sched-name { font-weight: 500; }
    .sched-pill { font-family: var(--mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; padding: 4px 10px; border-radius: 20px; white-space: nowrap; border: 1px solid transparent; }
    .pill-live  { background: var(--green-lt);  color: var(--green);  border-color: rgba(40,120,80,.2); }
    .pill-done  { background: var(--slate-lt);  color: var(--slate);  border-color: #E2E8F0; }
    html[data-theme="dark"] .pill-done { background: var(--surface-2); border-color: var(--border); }
    .pill-next  { background: var(--accent-lt); color: var(--accent); border-color: var(--border); }
    .live-dot   { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 5px; vertical-align: middle; animation: pulse 1.8s ease-in-out infinite; }

    /* SECTION LABEL */
    .section-label { font-family: var(--mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .15em; color: var(--muted); margin: 32px 0 16px; display: flex; align-items: center; gap: 12px; animation: fadeUp .45s .14s cubic-bezier(.22,1,.36,1) both; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); opacity: 0.6; }

    /* CARDS GRID */
    .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; animation: fadeUp .45s .18s cubic-bezier(.22,1,.36,1) both; }
    .feature-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--sh); text-decoration: none; color: inherit; padding: 24px; display: flex; flex-direction: column; height: 100%; }
    .card-icon { width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0; background: var(--accent-lt); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(var(--accent-rgb), 0.1); margin-bottom: 16px; }
    .card-icon svg { width: 24px; height: 24px; fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .card-bus      .card-icon { background: var(--surface-2);  border-color: var(--border); }
    .card-bus      .card-icon svg { stroke: var(--text); }
    .card-profs    .card-icon { background: var(--amber-lt);  border-color: rgba(198,140,26,0.1); }
    .card-profs    .card-icon svg { stroke: var(--amber); }
    .card-calendar .card-icon { background: #DBEAFE; border-color: rgba(37,99,235,0.1); }
    .card-calendar .card-icon svg { stroke: #2563EB; }
    .card-body  { flex: 1; display: flex; flex-direction: column; }
    .card-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -.01em; }
    .card-desc  { font-size: 12.5px; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }
    .card-cta   { margin-top: auto; font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: .06em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 6px; padding-top: 12px; border-top: 1px solid var(--border); }
    .card-cta svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s; }
    .feature-card:hover .card-cta svg { transform: translateX(5px); }
    .card-bus      .card-cta { color: var(--text); }
    .card-profs    .card-cta { color: var(--amber); }
    .card-calendar .card-cta { color: #2563EB; }

    /* ANIMATIONS */
    .clock-block    { animation: fadeUp .45s cubic-bezier(.22,1,.36,1) both; }
    .schedule-card  { animation: fadeUp .45s .08s cubic-bezier(.22,1,.36,1) both; }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(198,140,26,.4); } 70% { box-shadow: 0 0 0 8px rgba(198,140,26,0); } 100% { box-shadow: 0 0 0 0 rgba(198,140,26,0); } }

    @media (max-width: 860px) { .cards-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 680px) {
      .clock-time  { font-size: 32px; }
      .cards-grid  { grid-template-columns: 1fr; gap: 14px; }
      .feature-card { padding: 20px; }
      .sched-row   { grid-template-columns: 116px 1fr auto; gap: 10px; padding: 13px 16px; }
      .schedule-header { padding: 15px 16px; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
      .schedule-header-left { justify-content: center; }
      .page-shell  { padding: 16px 14px 20px; }
    }
    @media (max-width: 400px) { .sched-row { grid-template-columns: 1fr auto; } .sched-time { display: none; } }
  </style>

  <script>
    const SCHEDULE = {
      1: [{start:'12:35',end:'14:15',label:'Artes'},{start:'14:25',end:'16:05',label:'Geografia'},{start:'16:20',end:'18:00',label:'Matemática'}],
      2: [{start:'12:35',end:'14:15',label:'Intro. Computação'},{start:'14:25',end:'16:05',label:'Inglês'},{start:'16:20',end:'18:00',label:'Física'}],
      3: [{start:'14:25',end:'16:05',label:'Ed. Física'},{start:'16:20',end:'18:00',label:'Filosofia'}],
      4: [{start:'12:35',end:'14:15',label:'Língua Portuguesa'},{start:'14:25',end:'16:05',label:'Interfaces Web'}],
      5: [{start:'12:35',end:'16:05',label:'Programação'},{start:'16:20',end:'18:00',label:'Matemática'}],
    };
    const DAYS_PT   = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    const MONTHS_PT = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

    function tickClock() {
      const n = new Date();
      document.getElementById('clock-hm').textContent = pad(n.getHours()) + ':' + pad(n.getMinutes());
      document.getElementById('clock-ss').textContent = pad(n.getSeconds());
      document.getElementById('clock-weekday').textContent = DAYS_PT[n.getDay()].toUpperCase();
      document.getElementById('clock-date').textContent = pad(n.getDate()) + '/' + pad(n.getMonth() + 1) + '/' + n.getFullYear();
    }

    function getEffectiveDow(now) {
      return now.getDay();
    }

    function findNextSchoolDay(fromDate) {
      const d = new Date(fromDate);
      for (let i = 1; i <= 7; i++) {
        d.setDate(d.getDate() + 1);
        const dow = d.getDay();
        if (SCHEDULE[dow] && SCHEDULE[dow].length > 0) return { dow: dow, date: new Date(d) };
      }
      return null;
    }

    function renderSchedule() {
      const n    = new Date();
      const mins = n.getHours() * 60 + n.getMinutes();
      const dow  = n.getDay();

      let displayDow, dayClasses, isFutureDay;

      // 1. Verificar se hoje ainda tem aulas
      const todayClasses = SCHEDULE[dow] || [];
      const todayDone = todayClasses.length > 0 && mins >= toMins(todayClasses[todayClasses.length - 1].end);

      if (todayClasses.length > 0 && !todayDone) {
        // Ainda há aulas hoje
        displayDow = dow;
        dayClasses = todayClasses;
        isFutureDay = false;
      } else {
        // Hoje não tem aula ou já acabaram. Procurar o próximo dia letivo.
        const next = findNextSchoolDay(n);
        if (next) {
          displayDow = next.dow;
          dayClasses = SCHEDULE[displayDow];
          isFutureDay = true;
        } else {
          displayDow = dow;
          dayClasses = [];
          isFutureDay = false;
        }
      }

      const badgeText = isFutureDay 
        ? (displayDow === 1 ? 'Segunda-feira' : DAYS_PT[displayDow])
        : DAYS_PT[dow];

      document.getElementById('schedule-day-badge').textContent = badgeText;

      const remaining = isFutureDay ? dayClasses.length : dayClasses.filter(c => toMins(c.end) > mins).length;
      document.getElementById('schedule-count').textContent = remaining + (isFutureDay ? ' aulas programadas' : ' restante(s) hoje');

      let markedNext = false;
      document.getElementById('today-schedule').innerHTML = dayClasses.map(c => {
        const startM = toMins(c.start), endM = toMins(c.end);
        let rowClass = '', pillClass = '', pillText = '', progressHtml = '';

        if (!isFutureDay && mins >= startM && mins < endM) {
          rowClass = 'live'; pillClass = 'pill-live';
          pillText = '<span class="live-dot"></span>Em aula agora';
          const pct = ((mins - startM) / (endM - startM)) * 100;
          progressHtml = `<div class="class-progress-bar" style="width:${pct.toFixed(1)}%"></div>`;
        } else if (!isFutureDay && mins >= endM) {
          rowClass = 'done'; pillClass = 'pill-done'; pillText = 'Concluída';
        } else {
          rowClass = 'upcoming';
          if (!markedNext) { rowClass += ' next-up'; markedNext = true; }
          pillClass = 'pill-next'; pillText = `Inicia às ${c.start}`;
        }

        return `<div class="sched-row ${rowClass}">${progressHtml}<div class="sched-time">${c.start} — ${c.end}</div><div class="sched-name">${c.label}</div><span class="sched-pill ${pillClass}">${pillText}</span></div>`;
      }).join('');
    }

    tickClock();
    renderSchedule();
    setInterval(tickClock, 1000);
    setInterval(() => { renderSchedule(); }, 15000);
  </script>
