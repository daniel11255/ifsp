<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário | Portal 1INFO-2</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F5F0EA;--surface:#FDFBF8;--surface-2:#ECE7DC;--border:#D9D0C3;
      --accent:#B85C2A;--accent-lt:#F4E2D2;--accent-dk:#8C401C;
      --text:#1E1711;--muted:#7C6E62;--danger:#B42318;--danger-lt:#F8D7D2;
      --green:#2D7A50;--green-lt:#D4EDE0;--amber:#C68C1A;--amber-lt:#FBF0D0;
      --radius:14px;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
      --sh:0 1px 3px rgba(30,20,10,.06),0 4px 16px rgba(30,20,10,.06);
      --sh-hover:0 8px 28px rgba(184,92,42,.15),0 2px 8px rgba(30,20,10,.08);
    }
    html[data-theme="dark"]{
      --bg:#171310;--surface:#201B18;--surface-2:#2C2520;--border:#3D332C;
      --accent:#D07848;--accent-lt:#281A10;--accent-dk:#E89870;
      --text:#EDE3D8;--muted:#8A7A6E;--danger:#F87171;--danger-lt:#321414;
      --green:#40A068;--green-lt:#102018;--amber:#D4A030;--amber-lt:#261C08;
      --sh:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.4);
      --sh-hover:0 8px 28px rgba(208,120,72,.2),0 2px 8px rgba(0,0,0,.4);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:var(--sans);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit}
    .topnav{position:sticky;top:0;z-index:200;background:rgba(245,240,234,.88);backdrop-filter:blur(20px) saturate(1.8);-webkit-backdrop-filter:blur(20px) saturate(1.8);border-bottom:1px solid var(--border);height:62px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
    html[data-theme="dark"] .topnav{background:rgba(23,19,16,.9)}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo{width:32px;height:32px;border-radius:8px;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(184,92,42,.35)}
    .nav-logo svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .nav-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em}
    .nav-tag{font-family:var(--mono);font-size:10px;background:var(--accent-lt);color:var(--accent);padding:2px 7px;border-radius:5px;border:1px solid var(--border)}
    .nav-links{display:flex;gap:2px;align-items:center}
    .nav-link{text-decoration:none;background:none;border:none;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--muted);padding:6px 11px;border-radius:8px;transition:background .15s,color .15s}
    .nav-link:hover{background:var(--surface-2);color:var(--text)}
    .nav-link.active{background:var(--accent-lt);color:var(--accent);font-weight:600}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
    .bn-items{display:flex;justify-content:space-around;align-items:center}
    .bn-link{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--muted);font-size:10px;font-weight:600;padding:4px 6px;border-radius:8px;flex:1;min-width:0}
    .bn-link svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .bn-link.active{color:var(--accent)}
    main{max-width:1040px;margin:0 auto;padding:28px 20px 80px}
    .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px}
    .eyebrow{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
    h1{font-size:26px;line-height:1.1;font-weight:800;margin-top:6px;letter-spacing:-.02em}
    .head-meta{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .next-event-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--sh);min-width:260px;max-width:360px}
    .next-event-kicker{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px}
    .next-event-title{font-size:14px;font-weight:800;color:var(--text);line-height:1.25}
    .next-event-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .view-tabs{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:20px;box-shadow:var(--sh)}
    .tab-btn{border:0;background:transparent;color:var(--muted);font-weight:700;padding:9px 14px;border-radius:9px;display:inline-flex;align-items:center;gap:8px}
    .tab-btn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .tab-btn.active{background:var(--accent);color:#fff}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .calendar-layout{display:block}
    .calendar-card,.editor-panel,.events-panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--sh);overflow:hidden}
    .calendar-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 22px;border-bottom:1px solid var(--border)}
    .month-title{font-size:20px;font-weight:800;letter-spacing:-.02em}
    .toolbar-actions{display:flex;align-items:center;gap:8px}
    .icon-btn,.btn{border:1px solid var(--border);background:var(--surface-2);color:var(--text);border-radius:9px;min-height:38px;padding:8px 12px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:background .15s,border-color .15s,color .15s,transform .15s}
    .icon-btn{width:38px;padding:0}
    .icon-btn svg,.btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .icon-btn:hover,.btn:hover{border-color:var(--accent);transform:translateY(-1px)}
    .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-dk);border-color:var(--accent-dk)}
    .btn-danger{background:var(--danger-lt);border-color:var(--danger-lt);color:var(--danger)}
    .btn-ghost{background:transparent}
    .legend{display:flex;flex-wrap:wrap;gap:8px;padding:12px 22px;border-bottom:1px solid var(--border)}
    .legend-chip,.category-badge{display:inline-flex;align-items:center;gap:7px;border-radius:999px;font-size:11px;font-weight:700;padding:5px 9px;border:1px solid transparent;white-space:nowrap}
    .legend-dot{width:8px;height:8px;border-radius:50%}
    .calendar-scroll{overflow-x:auto;padding:0 22px 22px}
    .calendar-grid{min-width:780px;border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .weekdays,.month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
    .weekday{padding:10px 12px;background:var(--surface-2);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .day-cell{border:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-width:0;min-height:108px;background:var(--surface);color:var(--text);padding:10px;display:flex;flex-direction:column;gap:6px;text-align:left;appearance:none;overflow:hidden}
    .month-grid .day-cell:nth-last-child(-n+7){border-bottom:0}
    .day-cell:nth-child(7n){border-right:0}
    .day-cell:hover{background:var(--surface-2)}
    .day-cell:focus-visible{outline:2px solid var(--accent);outline-offset:-3px}
    .day-cell.outside{background:var(--surface-2);color:var(--muted)}
    .day-cell.today{box-shadow:inset 0 0 0 2px var(--accent)}
    .day-cell.selected{background:var(--accent-lt)}
    .day-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .day-number{font-family:var(--mono);font-size:12px;font-weight:800}
    .day-count{font-size:10px;font-weight:800;color:var(--muted)}
    .event-stack{display:flex;flex-direction:column;gap:5px;min-width:0}
    .event-pill{border:0;border-left:4px solid currentColor;background:var(--surface-2);color:var(--text);border-radius:7px;padding:6px 7px;text-align:left;min-height:30px;display:flex;flex-direction:column;gap:2px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
    .event-pill strong{font-size:11px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .event-pill span{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .more-events{font-size:11px;font-weight:800;color:var(--muted);padding:2px 1px}
    .day-panel{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(30,23,17,.28);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    html[data-theme="dark"] .day-panel{background:rgba(0,0,0,.46)}
    .day-sheet{width:min(620px,100%);max-height:min(720px,calc(100vh - 44px));display:flex;flex-direction:column;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--sh-hover);animation:sheetIn .24s cubic-bezier(.22,1,.36,1) both}
    .panel-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .panel-title{font-size:18px;font-weight:800;letter-spacing:-.01em}
    .panel-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .panel-close{flex:0 0 auto;width:36px;height:36px;border:1px solid var(--border);border-radius:9px;background:var(--surface-2);color:var(--muted);display:inline-flex;align-items:center;justify-content:center}
    .panel-close:hover{color:var(--text);border-color:var(--accent)}
    .panel-close svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .panel-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:10px;overflow:auto}
    .empty{padding:20px;border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-size:13px;text-align:center;background:var(--surface-2)}
    .day-event{border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--surface)}
    .day-event-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
    .day-event h3{font-size:15px;line-height:1.25}
    .event-subject{font-size:12px;font-weight:700;color:var(--accent);margin-top:3px}
    .event-time{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
    .event-desc{font-size:13px;color:var(--muted);line-height:1.45;margin-top:8px;white-space:pre-wrap}
    .resource-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
    .resource-link{display:inline-flex;align-items:center;gap:7px;color:var(--accent);font-size:12px;font-weight:800;text-decoration:none;word-break:break-word}
    .resource-link:hover{text-decoration:underline}
    @keyframes sheetIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .editor-layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;align-items:start}
    .editor-panel,.events-panel{padding:16px}
    .section-title{font-size:18px;font-weight:800;margin-bottom:12px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field.full{grid-column:1/-1}
    label{font-size:12px;font-weight:800;color:var(--muted)}
    input,select,textarea{width:100%;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;padding:10px 11px;outline:none;transition:border-color .15s,box-shadow .15s}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.16)}
    textarea{min-height:118px;resize:vertical}
    .link-row{display:grid;grid-template-columns:160px 1fr 38px;gap:8px;margin-bottom:8px}
    .attachment-area{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .file-input{position:absolute;inline-size:1px;block-size:1px;opacity:0;pointer-events:none}
    .attachment-list{display:flex;flex-direction:column;gap:7px;margin-top:9px}
    .attachment-item{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--surface-2);font-size:12px}
    .attachment-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .form-actions{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:16px}
    .form-actions-group{display:flex;gap:8px;flex-wrap:wrap}
    .events-list{display:flex;flex-direction:column;gap:10px;max-height:680px;overflow:auto;padding-right:4px}
    .event-row{border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--surface);display:flex;flex-direction:column;gap:9px}
    .event-row-top{display:flex;justify-content:space-between;gap:10px}
    .event-row-title{font-size:14px;font-weight:800}
    .event-row-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
    .event-row-actions{display:flex;gap:8px}
    .mini-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface-2);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--text)}
    .mini-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--text);color:var(--bg);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:800;box-shadow:var(--sh);z-index:10000}
    [hidden]{display:none!important}
    @media(max-width:980px){
      .editor-layout{grid-template-columns:1fr}
      .page-head{align-items:flex-start;flex-direction:column}
      .head-meta{justify-content:flex-start;width:100%}
      .next-event-card{max-width:none;width:100%}
    }
    @media(max-width:640px){
      .topnav{padding:0 16px}.nav-links{display:none}.bottom-nav{display:block}
      main{padding:18px 12px 92px}
      h1{font-size:24px}
      .view-tabs{display:grid;grid-template-columns:1fr 1fr;width:100%}
      .tab-btn{justify-content:center;padding:10px 8px}
      .calendar-toolbar{align-items:flex-start;flex-direction:column}
      .toolbar-actions{width:100%;justify-content:space-between}
      .calendar-grid{min-width:680px}
      .day-cell{min-height:96px}
      .day-panel{align-items:flex-end;padding:14px}
      .day-sheet{max-height:82vh;border-radius:14px 14px 10px 10px}
      .form-grid{grid-template-columns:1fr}
      .link-row{grid-template-columns:1fr}
      .link-row .mini-btn{width:100%}
      .form-actions{flex-direction:column}
      .form-actions-group,.form-actions .btn{width:100%}
    }
  </style>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>
  <script src="theme.js" defer></script>
  <script src="eventos.js"></script>
  <nav class="topnav">
    <a href="index.html" class="nav-brand">
      <div class="nav-logo"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
      <span class="nav-title">Portal</span>
      <span class="nav-tag">1INFO-2</span>
    </a>
    <nav class="nav-links">
      <a href="aulas.html" class="nav-link">Grade</a>
      <a href="calendario.html" class="nav-link active">Calendário</a>
      <a href="onibus.html" class="nav-link">Ônibus</a>
      <a href="horarios.html" class="nav-link">Professores</a>
    </nav>
  </nav>

  <nav class="bottom-nav">
    <div class="bn-items">
      <a href="index.html" class="bn-link"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><polyline points="9 21 9 12 15 12 15 21"/></svg><span>Portal</span></a>
      <a href="aulas.html" class="bn-link"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Grade</span></a>
      <a href="calendario.html" class="bn-link active"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg><span>Calendário</span></a>
      <a href="onibus.html" class="bn-link"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h10M7 11h5"/></svg><span>Ônibus</span></a>
      <a href="horarios.html" class="bn-link"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-8 0v2"/><circle cx="12" cy="7" r="4"/></svg><span>Professores</span></a>
    </div>
  </nav>

  <main>
    <header class="page-head">
      <div>
        <div class="eyebrow">Calendário escolar</div>
        <h1>Compromissos da turma</h1>
      </div>
      <div class="head-meta">
        <div class="next-event-card" id="next-event-card">
          <div class="next-event-kicker">Próximo evento</div>
          <div class="next-event-title" id="next-event-title">Nenhum evento agendado</div>
          <div class="next-event-meta" id="next-event-meta">Cadastre um novo compromisso</div>
        </div>
      </div>
    </header>

    <div class="view-tabs" role="tablist" aria-label="Áreas do calendário">
      <button class="tab-btn active" type="button" role="tab" aria-selected="true" data-tab="calendar">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Visualização
      </button>
      <button class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="editor">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Criar e editar
      </button>
    </div>

    <section class="tab-panel active" id="panel-calendar" role="tabpanel">
      <div class="calendar-layout">
        <section class="calendar-card" aria-label="Calendário mensal">
          <div class="calendar-toolbar">
            <div class="month-title" id="month-title">Mês</div>
            <div class="toolbar-actions">
              <button class="icon-btn" type="button" id="prev-month" aria-label="Mês anterior"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
              <button class="icon-btn" type="button" id="next-month" aria-label="Próximo mês"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
            </div>
          </div>
          <div class="legend" id="category-legend"></div>
          <div class="calendar-scroll">
            <div class="calendar-grid">
              <div class="weekdays" aria-hidden="true">
                <div class="weekday">Dom</div><div class="weekday">Seg</div><div class="weekday">Ter</div><div class="weekday">Qua</div><div class="weekday">Qui</div><div class="weekday">Sex</div><div class="weekday">Sáb</div>
              </div>
              <div class="month-grid" id="month-grid"></div>
            </div>
          </div>
        </section>

        <aside class="day-panel" id="day-panel" aria-live="polite" aria-modal="true" role="dialog" hidden>
          <section class="day-sheet" aria-labelledby="selected-day-title">
            <div class="panel-head">
              <div>
                <div class="panel-title" id="selected-day-title">Dia selecionado</div>
                <div class="panel-sub" id="selected-day-sub">0 eventos</div>
              </div>
              <button class="panel-close" type="button" id="close-day-panel" aria-label="Fechar detalhes do dia">
                <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
              </button>
            </div>
            <div class="panel-body" id="selected-day-events"></div>
          </section>
        </aside>
      </div>
    </section>

    <section class="tab-panel" id="panel-editor" role="tabpanel">
      <div class="editor-layout">
        <section class="editor-panel">
          <h2 class="section-title" id="form-heading">Novo evento</h2>
          <form id="event-form">
            <input type="hidden" id="event-id">
            <div class="form-grid">
              <div class="field full">
                <label for="event-title">Título</label>
                <input id="event-title" type="text" maxlength="90" required>
              </div>
              <div class="field">
                <label for="event-date">Data</label>
                <input id="event-date" type="date" required>
              </div>
              <div class="field">
                <label for="event-category">Categoria</label>
                <select id="event-category" required>
                  <option value="atividade">Atividade</option>
                  <option value="prova">Prova</option>
                  <option value="sabado-letivo">Sábado letivo</option>
                </select>
              </div>
              <div class="field">
                <label for="event-subject">Matéria</label>
                <select id="event-subject" required>
                  <option value="">Selecione a matéria</option>
                  <option value="Artes">Artes</option>
                  <option value="Educação Física">Educação Física</option>
                  <option value="Filosofia">Filosofia</option>
                  <option value="Física">Física</option>
                  <option value="Geografia">Geografia</option>
                  <option value="Inglês">Inglês</option>
                  <option value="Interfaces Web">Interfaces Web</option>
                  <option value="Introdução à Computação">Introdução à Computação</option>
                  <option value="Língua Portuguesa">Língua Portuguesa</option>
                  <option value="Matemática">Matemática</option>
                  <option value="Programação">Programação</option>
                  <option value="Geral">Geral</option>
                </select>
              </div>
              <div class="field">
                <label for="event-start">Início</label>
                <input id="event-start" type="time" required>
              </div>
              <div class="field">
                <label for="event-end">Fim</label>
                <input id="event-end" type="time" required>
              </div>
              <div class="field full" id="schedule-day-field" hidden>
                <label for="event-schedule-dow">Grade usada no sábado letivo</label>
                <select id="event-schedule-dow">
                  <option value="1">Segunda-feira</option>
                  <option value="2">Terça-feira</option>
                  <option value="3">Quarta-feira</option>
                  <option value="4">Quinta-feira</option>
                  <option value="5">Sexta-feira</option>
                </select>
              </div>
              <div class="field full">
                <label for="event-description">Descrição e detalhes</label>
                <textarea id="event-description" maxlength="900"></textarea>
              </div>
              <div class="field full">
                <label>Links</label>
                <div id="links-list"></div>
                <button class="btn btn-ghost" type="button" id="add-link"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Adicionar link</button>
              </div>
              <div class="field full">
                <label>Anexos</label>
                <div class="attachment-area">
                  <input class="file-input" id="event-files" type="file" multiple>
                  <label class="btn btn-ghost" for="event-files"><svg viewBox="0 0 24 24"><path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>Selecionar arquivos</label>
                </div>
                <div class="attachment-list" id="attachments-list"></div>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-danger" type="button" id="delete-event" hidden><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>Excluir</button>
              <div class="form-actions-group">
                <button class="btn btn-ghost" type="button" id="reset-form">Novo</button>
                <button class="btn btn-primary" type="submit"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>Salvar evento</button>
              </div>
            </div>
          </form>
        </section>

        <aside class="events-panel">
          <h2 class="section-title">Eventos cadastrados</h2>
          <div class="events-list" id="events-list"></div>
        </aside>
      </div>
    </section>
  </main>

  <script>
    const categories = window.portalCalendarCategories;
    const defaultIds = new Set((window.portalCalendarDefaults || []).map((event) => event.id));
    const dayNames = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
    const monthNames = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    const today = new Date();
    let currentMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    let selectedDate = toDateKey(today);
    let pendingAttachments = [];

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => [...document.querySelectorAll(selector)];

    function pad(value){return String(value).padStart(2,'0');}
    function toMins(time){const [h,m]=String(time || '00:00').split(':').map(Number);return (h || 0) * 60 + (m || 0);}
    function toDateKey(date){return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;}
    function parseDateKey(key){const [y,m,d]=String(key).split('-').map(Number);return new Date(y,m-1,d);}
    function escapeHtml(value){return String(value || '').replace(/[&<>"']/g,(char)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));}
    function formatDateLong(key){const date=parseDateKey(key);return `${dayNames[date.getDay()]}, ${pad(date.getDate())} de ${monthNames[date.getMonth()]} de ${date.getFullYear()}`;}
    function formatDateShort(key){const date=parseDateKey(key);return `${pad(date.getDate())}/${pad(date.getMonth()+1)}`;}
    function formatSize(bytes){if(!bytes)return 'arquivo';if(bytes<1024)return `${bytes} B`;if(bytes<1024*1024)return `${Math.round(bytes/1024)} KB`;return `${(bytes/(1024*1024)).toFixed(1)} MB`;}
    function eventSubject(event){
      if (event.subject) return event.subject;
      const title = `${event.title || ''} ${event.description || ''}`.toLowerCase();
      const subjects = ['Artes','Educação Física','Filosofia','Física','Geografia','Inglês','Interfaces Web','Introdução à Computação','Língua Portuguesa','Matemática','Programação'];
      return subjects.find((subject)=>title.includes(subject.toLowerCase())) || 'Geral';
    }
    function normalizeUrl(url){
      const trimmed = String(url || '').trim();
      if (!trimmed) return '';
      const withProtocol = /^[a-z][a-z0-9+.-]*:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
      try { return new URL(withProtocol).href; } catch { return ''; }
    }
    function getStored(){return window.readStoredCalendarEvents ? window.readStoredCalendarEvents() : [];}
    function saveStored(events){
      const saved = window.saveStoredCalendarEvents(events);
      if (saved !== false) window.sabadosLetivos = buildSabadosLetivos(getEvents());
      return saved !== false;
    }
    function getEvents(){return window.getPortalCalendarEvents ? window.getPortalCalendarEvents() : [];}
    function buildSabadosLetivos(events){
      return events.reduce((days,event)=>{
        if(event.category === 'sabado-letivo' && event.date) days[event.date] = Number(event.scheduleDow) || 1;
        return days;
      },{});
    }
    function eventsForDate(dateKey){return getEvents().filter((event)=>event.date===dateKey);}
    function categoryMeta(key){return categories[key] || {label:key || 'Evento',color:'var(--muted)',soft:'var(--surface-2)'};}
    function showToast(message){
      const old = $('.toast');
      if (old) old.remove();
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(),2200);
    }
    function categoryBadge(category){
      const meta = categoryMeta(category);
      return `<span class="category-badge" style="background:${meta.soft};color:${meta.color};border-color:${meta.color}22"><span class="legend-dot" style="background:${meta.color}"></span>${escapeHtml(meta.label)}</span>`;
    }
    function renderLegend(){
      $('#category-legend').innerHTML = Object.entries(categories).map(([key,meta])=>`
        <span class="legend-chip" style="background:${meta.soft};color:${meta.color};border-color:${meta.color}22">
          <span class="legend-dot" style="background:${meta.color}"></span>${escapeHtml(meta.label)}
        </span>
      `).join('');
    }
    function renderNextEvent(){
      const events = getEvents();
      const now = new Date();
      const todayKey = toDateKey(now);
      const nowMins = now.getHours() * 60 + now.getMinutes();
      const upcoming = events.find((event)=>{
        if (!event.date) return false;
        if (event.date > todayKey) return true;
        if (event.date < todayKey) return false;
        const end = event.end || event.start || '23:59';
        return toMins(end) >= nowMins;
      });
      if (!upcoming) {
        $('#next-event-title').textContent = 'Nenhum evento agendado';
        $('#next-event-meta').textContent = 'Cadastre um novo compromisso';
        return;
      }
      const meta = categoryMeta(upcoming.category);
      $('#next-event-title').textContent = `${meta.label} · ${eventSubject(upcoming)}`;
      $('#next-event-meta').textContent = `${formatDateShort(upcoming.date)} às ${upcoming.start || '--:--'}${upcoming.title ? ` · ${upcoming.title}` : ''}`;
    }
    function renderCalendar(){
      renderNextEvent();
      const monthLabel = `${monthNames[currentMonth.getMonth()]} de ${currentMonth.getFullYear()}`;
      $('#month-title').textContent = monthLabel.charAt(0).toUpperCase() + monthLabel.slice(1);
      const first = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      const cells = [];
      for (let i=0;i<42;i++){
        const date = new Date(start);
        date.setDate(start.getDate()+i);
        const key = toDateKey(date);
        const dayEvents = eventsForDate(key);
        const visibleEvents = dayEvents.slice(0,3);
        const classes = ['day-cell'];
        if (date.getMonth() !== currentMonth.getMonth()) classes.push('outside');
        if (key === toDateKey(today)) classes.push('today');
        if (key === selectedDate) classes.push('selected');
        cells.push(`
          <button class="${classes.join(' ')}" type="button" data-date="${key}" aria-label="${escapeHtml(formatDateLong(key))}">
            <span class="day-top">
              <span class="day-number">${date.getDate()}</span>
              ${dayEvents.length ? `<span class="day-count">${dayEvents.length}</span>` : ''}
            </span>
            <span class="event-stack">
              ${visibleEvents.map((event)=>{
                const meta = categoryMeta(event.category);
                return `<span class="event-pill" style="color:${meta.color};background:${meta.soft}">
                  <span>${escapeHtml(meta.label)}</span>
                  <strong>${escapeHtml(eventSubject(event))}</strong>
                </span>`;
              }).join('')}
              ${dayEvents.length > 3 ? `<span class="more-events">+${dayEvents.length - 3} eventos</span>` : ''}
            </span>
          </button>
        `);
      }
      $('#month-grid').innerHTML = cells.join('');
      $$('#month-grid .day-cell').forEach((cell)=>{
        cell.addEventListener('click',()=>{
          selectedDate = cell.dataset.date;
          renderCalendar();
          renderDayPanel();
          openDayPanel();
        });
      });
    }
    function openDayPanel(){
      $('#day-panel').hidden = false;
      document.body.style.overflow = 'hidden';
      const closeButton = $('#close-day-panel');
      if (closeButton) closeButton.focus();
    }
    function closeDayPanel(){
      $('#day-panel').hidden = true;
      document.body.style.overflow = '';
    }
    function renderDayPanel(){
      const events = eventsForDate(selectedDate);
      $('#selected-day-title').textContent = formatDateLong(selectedDate);
      $('#selected-day-sub').textContent = `${events.length} ${events.length === 1 ? 'evento' : 'eventos'}`;
      if (!events.length) {
        $('#selected-day-events').innerHTML = `
          <div class="empty">Nenhum evento cadastrado para este dia.</div>
          <button class="btn btn-primary" type="button" id="create-for-day"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Novo evento neste dia</button>
        `;
      } else {
        $('#selected-day-events').innerHTML = events.map((event)=>`
          <article class="day-event">
            <div class="day-event-head">
              <div>
                ${categoryBadge(event.category)}
                <h3>${escapeHtml(event.title)}</h3>
                <div class="event-subject">${escapeHtml(eventSubject(event))}</div>
                <div class="event-time">${escapeHtml(event.start || '--:--')} - ${escapeHtml(event.end || '--:--')}</div>
              </div>
              <button class="mini-btn" type="button" data-edit="${escapeHtml(event.id)}" aria-label="Editar evento"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
            </div>
            ${event.description ? `<div class="event-desc">${escapeHtml(event.description)}</div>` : ''}
            ${renderResources(event)}
          </article>
        `).join('') + `<button class="btn btn-primary" type="button" id="create-for-day"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Novo evento neste dia</button>`;
      }
      $('#create-for-day').addEventListener('click',()=>startNewEvent(selectedDate));
      $$('[data-edit]').forEach((button)=>button.addEventListener('click',()=>editEvent(button.dataset.edit)));
    }
    function renderResources(event){
      const links = Array.isArray(event.links) ? event.links : [];
      const attachments = Array.isArray(event.attachments) ? event.attachments : [];
      const linkHtml = links.map((link)=>`<a class="resource-link" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.07 0l2.12-2.12a5 5 0 0 0-7.07-7.07L11 4.93"/><path d="M14 11a5 5 0 0 0-7.07 0L4.81 13.12a5 5 0 0 0 7.07 7.07L13 19.07"/></svg>${escapeHtml(link.label || link.url)}</a>`).join('');
      const fileHtml = attachments.map((file)=>`<a class="resource-link" href="${escapeHtml(file.dataUrl || '#')}" download="${escapeHtml(file.name)}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>${escapeHtml(file.name)} (${formatSize(file.size)})</a>`).join('');
      return linkHtml || fileHtml ? `<div class="resource-list">${linkHtml}${fileHtml}</div>` : '';
    }
    function renderEventsList(){
      const events = getEvents();
      $('#events-list').innerHTML = events.length ? events.map((event)=>`
        <article class="event-row">
          <div class="event-row-top">
            <div>
              ${categoryBadge(event.category)}
              <div class="event-row-title">${escapeHtml(event.title)}</div>
              <div class="event-row-meta">${escapeHtml(eventSubject(event))} · ${escapeHtml(event.date)} · ${escapeHtml(event.start || '--:--')} - ${escapeHtml(event.end || '--:--')}</div>
            </div>
            <div class="event-row-actions">
              <button class="mini-btn" type="button" data-edit-list="${escapeHtml(event.id)}" aria-label="Editar evento"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
            </div>
          </div>
        </article>
      `).join('') : '<div class="empty">Nenhum evento cadastrado.</div>';
      $$('[data-edit-list]').forEach((button)=>button.addEventListener('click',()=>editEvent(button.dataset.editList)));
    }
    function switchTab(name){
      $$('.tab-btn').forEach((button)=>{
        const active = button.dataset.tab === name;
        button.classList.toggle('active',active);
        button.setAttribute('aria-selected',String(active));
      });
      $$('.tab-panel').forEach((panel)=>panel.classList.remove('active'));
      $(`#panel-${name}`).classList.add('active');
    }
    function addLinkRow(link = {label:'',url:''}){
      const row = document.createElement('div');
      row.className = 'link-row';
      row.innerHTML = `
        <input type="text" class="link-label" placeholder="Nome" value="${escapeHtml(link.label || '')}">
        <input type="text" class="link-url" placeholder="https://site.com" value="${escapeHtml(link.url || '')}">
        <button class="mini-btn" type="button" aria-label="Remover link"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      `;
      row.querySelector('button').addEventListener('click',()=>row.remove());
      $('#links-list').appendChild(row);
    }
    function collectLinks(){
      return $$('#links-list .link-row').map((row)=>{
        const label = row.querySelector('.link-label').value.trim();
        const url = normalizeUrl(row.querySelector('.link-url').value);
        if (!url) return null;
        return {label:label || url,url};
      }).filter(Boolean);
    }
    function renderAttachments(){
      $('#attachments-list').innerHTML = pendingAttachments.map((file,index)=>`
        <div class="attachment-item">
          <span>${escapeHtml(file.name)} · ${formatSize(file.size)}</span>
          <button class="mini-btn" type="button" data-remove-attachment="${index}" aria-label="Remover anexo"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        </div>
      `).join('');
      $$('[data-remove-attachment]').forEach((button)=>{
        button.addEventListener('click',()=>{
          pendingAttachments.splice(Number(button.dataset.removeAttachment),1);
          renderAttachments();
        });
      });
    }
    async function readFiles(files){
      const added = [];
      for (const file of files) {
        if (file.size > 2 * 1024 * 1024) {
          showToast(`${file.name} excede 2 MB`);
          continue;
        }
        const dataUrl = await new Promise((resolve,reject)=>{
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        added.push({name:file.name,size:file.size,type:file.type,dataUrl});
      }
      pendingAttachments = [...pendingAttachments, ...added];
      renderAttachments();
    }
    function startNewEvent(dateKey = selectedDate){
      closeDayPanel();
      $('#event-form').reset();
      $('#event-id').value = '';
      $('#event-date').value = dateKey;
      $('#event-subject').value = '';
      $('#event-start').value = '12:35';
      $('#event-end').value = '14:15';
      $('#form-heading').textContent = 'Novo evento';
      $('#delete-event').hidden = true;
      $('#links-list').innerHTML = '';
      addLinkRow();
      pendingAttachments = [];
      renderAttachments();
      updateScheduleField();
      switchTab('editor');
      $('#event-title').focus();
    }
    function editEvent(id){
      const event = getEvents().find((item)=>item.id === id);
      if (!event) return;
      closeDayPanel();
      $('#event-id').value = event.id;
      $('#event-title').value = event.title || '';
      $('#event-date').value = event.date || selectedDate;
      $('#event-category').value = event.category || 'atividade';
      $('#event-subject').value = event.subject || eventSubject(event);
      $('#event-start').value = event.start || '';
      $('#event-end').value = event.end || '';
      $('#event-description').value = event.description || '';
      $('#event-schedule-dow').value = String(event.scheduleDow || 1);
      $('#form-heading').textContent = 'Editar evento';
      $('#delete-event').hidden = false;
      $('#links-list').innerHTML = '';
      const links = Array.isArray(event.links) && event.links.length ? event.links : [{}];
      links.forEach(addLinkRow);
      pendingAttachments = Array.isArray(event.attachments) ? [...event.attachments] : [];
      renderAttachments();
      updateScheduleField();
      switchTab('editor');
      $('#event-title').focus();
    }
    function upsertStoredEvent(event){
      const stored = getStored().filter((item)=>item && item.id !== event.id);
      stored.push(event);
      return saveStored(stored);
    }
    function removeEvent(id){
      const stored = getStored().filter((item)=>item && item.id !== id);
      if (defaultIds.has(id)) stored.push({id, deleted:true});
      return saveStored(stored);
    }
    function updateScheduleField(){
      $('#schedule-day-field').hidden = $('#event-category').value !== 'sabado-letivo';
    }
    function saveEventFromForm(event){
      event.preventDefault();
      const start = $('#event-start').value;
      const end = $('#event-end').value;
      if (start && end && start >= end) {
        showToast('O horário final deve ser depois do início.');
        return;
      }
      const id = $('#event-id').value || `event-${Date.now()}`;
      const calendarEvent = {
        id,
        title: $('#event-title').value.trim(),
        date: $('#event-date').value,
        start,
        end,
        category: $('#event-category').value,
        subject: $('#event-subject').value,
        description: $('#event-description').value.trim(),
        links: collectLinks(),
        attachments: pendingAttachments
      };
      if (calendarEvent.category === 'sabado-letivo') {
        calendarEvent.scheduleDow = Number($('#event-schedule-dow').value) || 1;
      }
      if (!upsertStoredEvent(calendarEvent)) {
        showToast('Não foi possível salvar. Reduza os anexos.');
        return;
      }
      selectedDate = calendarEvent.date;
      currentMonth = new Date(parseDateKey(calendarEvent.date).getFullYear(), parseDateKey(calendarEvent.date).getMonth(), 1);
      renderAll();
      editEvent(id);
      showToast('Evento salvo.');
    }
    function renderAll(){
      renderCalendar();
      renderDayPanel();
      renderEventsList();
      renderNextEvent();
    }
    $('#prev-month').addEventListener('click',()=>{currentMonth.setMonth(currentMonth.getMonth()-1);renderCalendar();});
    $('#next-month').addEventListener('click',()=>{currentMonth.setMonth(currentMonth.getMonth()+1);renderCalendar();});
    $$('.tab-btn').forEach((button)=>button.addEventListener('click',()=>switchTab(button.dataset.tab)));
    $('#close-day-panel').addEventListener('click',closeDayPanel);
    $('#day-panel').addEventListener('click',(event)=>{
      if (event.target === $('#day-panel')) closeDayPanel();
    });
    document.addEventListener('keydown',(event)=>{
      if (event.key === 'Escape' && !$('#day-panel').hidden) closeDayPanel();
    });
    $('#add-link').addEventListener('click',()=>addLinkRow());
    $('#event-files').addEventListener('change',(event)=>readFiles(event.target.files).finally(()=>{event.target.value='';}));
    $('#event-category').addEventListener('change',updateScheduleField);
    $('#reset-form').addEventListener('click',()=>startNewEvent(selectedDate));
    $('#delete-event').addEventListener('click',()=>{
      const id = $('#event-id').value;
      if (!id) return;
      if (!removeEvent(id)) {
        showToast('Não foi possível excluir agora.');
        return;
      }
      startNewEvent(selectedDate);
      renderAll();
      showToast('Evento excluído.');
    });
    $('#event-form').addEventListener('submit',saveEventFromForm);

    renderLegend();
    addLinkRow();
    $('#event-date').value = selectedDate;
    renderAll();
  </script>
</body>
</html>
